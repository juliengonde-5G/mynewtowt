services:
  db:
    image: postgres:16-alpine
    container_name: mynewtowt-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-towt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
      POSTGRES_DB: ${POSTGRES_DB:-towt}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-towt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: mynewtowt-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-towt}:${POSTGRES_PASSWORD:-change_me_local}@db:5432/${POSTGRES_DB:-towt}
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
