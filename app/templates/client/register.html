{% extends "base.html" %}
{% block title %}Créer un compte — NEWTOWT{% endblock %}
{% block body %}
<div class="auth-shell">
  <div class="auth-card">
    <h2>Créer un compte</h2>
    {% if error %}
      <div class="alert alert-error" role="alert">{{ error }}</div>
    {% endif %}
    <form method="post" action="/me/register">
      <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}" />
      <div class="field">
        <label for="company_name">Société</label>
        <input id="company_name" name="company_name" required />
      </div>
      <div class="field">
        <label for="contact_name">Nom du contact</label>
        <input id="contact_name" name="contact_name" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="country">Pays (code 2 lettres)</label>
        <input id="country" name="country" maxlength="2" placeholder="FR" />
      </div>
      <div class="field">
        <label for="password">Mot de passe (≥ 12 caractères)</label>
        <input id="password" type="password" name="password" minlength="12" required autocomplete="new-password" />
      </div>
      <button class="btn btn-primary btn-block btn-lg" type="submit">Créer le compte</button>
    </form>
    <p class="text-center text-muted mt-4">
      Déjà un compte ?
      <a href="/me/login">Se connecter</a>
    </p>
  </div>
</div>
{% endblock %}
