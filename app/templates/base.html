<!DOCTYPE html>
<html lang="{{ lang|default('fr') }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{% if lang == 'en' %}NEWTOWT — Wind-powered cargo shipping. ERP & customer platform.{% else %}NEWTOWT — Transport maritime cargo à la voile. ERP & plateforme client.{% endif %}{% endblock %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="/static/css/kairos.css" />
  <link rel="icon" type="image/png" href="/static/img/favicon.png" />
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
  <script src="/static/js/csrf-htmx.js" defer></script>
  <script src="/static/js/lucide-init.js" defer></script>
  <script src="/static/js/toast.js" defer></script>
  <script src="/static/js/modal.js" defer></script>
  <script src="/static/js/forms.js" defer></script>
  <script src="/static/js/towt-tz.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  <a href="#main" class="skip-link">
    {% if lang == 'en' %}Skip to main content{% else %}Aller au contenu principal{% endif %}
  </a>
  {% block body %}{% endblock %}
  <div id="modal-container" class="modal-container" aria-hidden="true"></div>
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
