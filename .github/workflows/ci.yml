name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check app tests
      - name: Black --check
        run: black --check app tests
      - name: Mypy
        run: mypy app

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: towt
          POSTGRES_PASSWORD: change_me_local
          POSTGRES_DB: towt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      APP_ENV: development
      SECRET_KEY: test_only_secret_key_with_more_than_32_characters_xxx
      DATABASE_URL: postgresql+asyncpg://towt:change_me_local@localhost:5432/towt_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run unit tests with coverage
        run: pytest tests/unit --cov=app --cov-report=term-missing --cov-report=xml
      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Bandit static analysis
        run: bandit -r app -ll -ii
      - name: Safety vuln check
        run: safety check -r requirements.txt || true   # informational
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-banner --redact -v
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t mynewtowt:${{ github.sha }} .
